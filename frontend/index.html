<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonufoot E-Commerce Store</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background-color: #1a202c;
            color: #ffffff;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 1200px;
            width: 90%;
            margin: 40px auto;
            text-align: center;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .product-card {
            background: #ffffff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-image {
            width: 100%;
            height: 200px;
            background-color: #e2e8f0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #718096;
            font-weight: bold;
        }
        .price {
            color: #3182ce;
            font-size: 1.25rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .btn {
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .btn:hover {
            background-color: #2b6cb0;
        }
    </style>
</head>
<body>

    <header>
        <h1>👟 SONUFOOT PREMIUM WORKSHOP 👟</h1>
        <p>Secured Cloud Orchestration Storefront</p>
    </header>

    <div class="container">
        <h2>Featured Collection</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <div class="product-image">CloudRunner Alpha v1</div>
                <h3>CloudRunner Alpha</h3>
                <p class="price">$129.99</p>
                <button class="btn" onclick="orderProduct('CloudRunner Alpha')">Buy Now</button>
            </div>

            <div class="product-card">
                <div class="product-image">Terraform Stealth Sneaker</div>
                <h3>Terraform Stealth</h3>
                <p class="price">$145.00</p>
                <button class="btn" onclick="orderProduct('Terraform Stealth')">Buy Now</button>
            </div>

            <div class="product-card">
                <div class="product-image">Kubernetes Boost</div>
                <h3>K8s Cluster Boosters</h3>
                <p class="price">$189.99</p>
                <button class="btn" onclick="orderProduct('K8s Cluster Boosters')">Buy Now</button>
            </div>

        </div>
    </div>

    <script>
        function orderProduct(name) {
            alert('Processing secure checkout for: ' + name + '\nConnecting to backend API layer...');
        }
    </script>
</body>
</html>
